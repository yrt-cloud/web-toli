<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extra Food - UI Refresh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menggunakan font yang lebih mirip dengan UI pada gambar (Semi-rounded & Clean) */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        :root {
            --teal-primary: #005E6A;      /* Biru Toska Utama */
            --teal-light: #7acfd6;        /* Biru Toska Muda */
            --amber-accent: #F15A23;      /* Kuning dari Search Bar Gambar */
            --barely-gray: #e6eff1;       /* Background kebiruan pucat */
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --input-bg: #f1f5f9;
        }

        [data-theme='dark'] {
            --barely-gray: #0a2d33; 
            --card-bg: #11424a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #1b5d66;
            --input-bg: #0a2d33;
            --teal-primary: #25c1d1;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--barely-gray); 
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .bg-white { background-color: var(--card-bg) !important; transition: background-color 0.3s ease; }
        .text-slate-900 { color: var(--text-main) !important; }
        .text-slate-700 { color: var(--text-main) !important; }
        .text-slate-600 { color: var(--text-main) !important; }
        .text-slate-400 { color: var(--text-muted) !important; }
        .border-slate-200, .border-slate-100 { border-color: var(--border-color) !important; }
        .bg-slate-50, .bg-slate-100 { background-color: var(--input-bg) !important; }

        .progress-container {
            height: 12px;
            background: var(--border-color);
            border-radius: 99px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            transition: width 0.6s ease;
            border-radius: 99px;
        }
        
        .item-input-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 10px;
            width: 100%;
            font-size: 11px;
            font-weight: 600;
            outline: none;
            color: var(--text-main);
        }

        @media print {
            .no-print { display: none !important; }
            #printArea { display: block !important; width: 100% !important; }
            body { background: white !important; color: black !important; }
        }
        #printArea { display: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: var(--barely-gray); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--teal-primary); border-radius: 10px; }

        #digitalClock { font-variant-numeric: tabular-nums; }

        .theme-toggle {
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            background: var(--amber-accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: cover;
            background-color: var(--teal-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 14px;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-[1400px] mx-auto no-print">
        <!-- HEADER -->
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-3xl border border-slate-200 card-shadow">
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-lg" style="background-color: var(--teal-primary);">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2H2m9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" stroke-width="2.5"></path></svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tight text-slate-900 uppercase">Extra<span style="color: var(--teal-primary);">Food</span></h1>
                        <p class="text-[9px] text-slate-400 font-extrabold uppercase tracking-[0.2em]">COC CASH BNI KCU BANDUNG</p>
                    </div>
                </div>

                <div class="hidden md:flex flex-col border-l-2 border-slate-100 pl-6">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">LIVE CLOCK</span>
                    <div id="digitalClock" class="text-xl font-extrabold tracking-tighter" style="color: var(--teal-primary);">00:00:00</div>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2 mt-4 md:mt-0">
                <button onclick="toggleTheme()" class="theme-toggle shadow-md">
                    <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 12.728L12 12m0 0l-4-4m4 4l4-4m-4 4l-4 4m4-4l4 4" stroke-width="2" stroke-linecap="round"></path><circle cx="12" cy="12" r="5" stroke-width="2"></circle></svg>
                    <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>

                <button onclick="document.getElementById('fileInput').click()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl font-bold text-[10px] uppercase hover:bg-slate-200 transition-all">Muat Data</button>
                <input type="file" id="fileInput" class="hidden" onchange="importData(event)">
                <button onclick="exportData()" class="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase hover:opacity-90 transition-all">Simpan Backup</button>
                <button onclick="printRekap()" class="text-white px-6 py-2 rounded-xl font-black text-[11px] uppercase flex items-center gap-2 hover:opacity-90 transition-all shadow-lg" style="background-color: var(--teal-primary);">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" stroke-width="2.5"></path></svg>
                    CETAK LAPORAN
                </button>
            </div>
        </header>

        <!-- DASHBOARD ATAS -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
            <div class="lg:col-span-3 bg-white p-6 rounded-[2rem] border border-slate-200 flex flex-col md:flex-row gap-6 card-shadow">
                <div class="flex-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block tracking-wider">Periode Aktif</label>
                    <input type="text" id="periodInput" oninput="updatePeriodMeta()" class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 font-bold text-sm uppercase w-full outline-none focus:ring-2 focus:ring-[#1ba0ad]">
                </div>
                <div class="flex-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block tracking-wider">Bulan Berjalan</label>
                    <input type="text" id="monthInput" oninput="updatePeriodMeta()" class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 font-bold text-sm uppercase w-full outline-none focus:ring-2 focus:ring-[#1ba0ad]">
                </div>
            </div>
            <div class="p-6 rounded-[2rem] flex flex-col justify-center items-center text-white relative overflow-hidden shadow-xl" style="background-color: var(--teal-primary);">
                <div class="absolute -right-6 -top-6 w-24 h-24 bg-white/20 rounded-full blur-2xl"></div>
                <p class="text-[10px] font-black opacity-80 uppercase tracking-[0.2em] mb-2">Total Seluruh Biaya</p>
                <h2 id="grandTotalDisplay" class="text-3xl font-black tracking-tighter">Rp 0</h2>
            </div>
        </div>

        <!-- SEARCH BAR -->
        <div class="mb-6 p-1.5 rounded-2xl flex items-center gap-4 shadow-inner" style="background-color: var(--amber-accent);">
            <div class="bg-white/20 p-3 rounded-xl ml-2">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="3" stroke-linecap="round"></path></svg>
            </div>
            <input type="text" id="searchEmployee" oninput="render()" placeholder="CARI NAMA PEGAWAI PADA KARTU..." class="w-full bg-transparent font-black text-xs uppercase tracking-widest outline-none text-white placeholder-white/70">
            <div class="text-[9px] font-black text-white/60 uppercase px-4 whitespace-nowrap">Database Search</div>
        </div>

        <!-- DAFTAR KARTU PEGAWAI -->
        <div id="employeeList" class="space-y-8 mb-16"></div>

        <!-- MASTER DATA -->
        <div class="mt-20 pt-10 border-t-2 border-slate-200 border-dashed">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Master Barang -->
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200 card-shadow">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="font-black text-[11px] uppercase text-slate-400 tracking-widest">Daftar Menu</h3>
                        <button onclick="addMasterItem()" class="px-4 py-1.5 rounded-full text-[10px] font-black hover:opacity-80 text-white" style="background-color: var(--teal-primary);">+ TAMBAH</button>
                    </div>
                    <!-- SEARCH MENU -->
                    <div class="mb-4">
                        <input type="text" id="searchMasterItem" oninput="renderMasterData()" placeholder="Cari menu..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-[10px] font-bold uppercase outline-none focus:ring-1 focus:ring-[#1ba0ad]">
                    </div>
                    <div class="max-h-72 overflow-y-auto pr-2 custom-scrollbar">
                        <table class="w-full">
                            <tbody id="masterItemTable"></tbody>
                        </table>
                    </div>
                </div>
                <!-- Master Pegawai -->
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200 card-shadow">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="font-black text-[11px] uppercase text-slate-400 tracking-widest">Daftar Pegawai</h3>
                        <button onclick="addMasterEmployee()" class="px-4 py-1.5 rounded-full text-[10px] font-black hover:opacity-80 text-white" style="background-color: var(--teal-primary);">+ TAMBAH</button>
                    </div>
                    <!-- SEARCH PEGAWAI -->
                    <div class="mb-4">
                        <input type="text" id="searchMasterEmployee" oninput="renderMasterData()" placeholder="Cari pegawai..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-[10px] font-bold uppercase outline-none focus:ring-1 focus:ring-[#1ba0ad]">
                    </div>
                    <div class="max-h-72 overflow-y-auto pr-2 custom-scrollbar">
                        <table class="w-full">
                            <tbody id="masterEmployeeTable"></tbody>
                        </table>
                    </div>
                </div>
                <!-- Budget -->
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-200 card-shadow space-y-6">
                    <h3 class="font-black text-[11px] uppercase text-slate-400 tracking-widest">Pengaturan Budget</h3>
                    <div class="p-5 rounded-2xl border bg-slate-50 border-slate-200">
                        <label class="text-[9px] font-black uppercase block mb-2 tracking-widest text-slate-400">Limit Per Minggu (Periode Ini)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 font-black text-sm text-slate-400">Rp</span>
                            <input type="number" id="limitInput" onchange="updateLimit(this.value)" class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 font-black text-lg outline-none focus:border-[#1ba0ad] bg-white">
                        </div>
                    </div>
                    <button onclick="addNewPeriod()" class="w-full text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:opacity-90 transition-all shadow-lg" style="background-color: var(--teal-primary);">Buka Minggu Baru</button>
                    <div id="periodList" class="flex flex-wrap gap-2 justify-center mt-4"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="printArea"></div>
    <datalist id="itemsDatalist"></datalist>

    <script>
        const STORAGE_KEY = 'extra_food_v58_data';
        const DAYS = ['SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT'];
        
        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            defaultBudgetLimit: 125000, 
            items: [
                { id: 1, name: 'NASI KOTAK', price: 25000 },
                { id: 2, name: 'SNACK BOX', price: 15000 },
                { id: 3, name: 'KOPI GULA', price: 5000 }
            ],
            employees: [{ id: 'emp_1', name: 'EMAN SUHERMAN', photo: '' }],
            archives: [{ id: Date.now(), period: 'MINGGU 1', month: 'APRIL 2026', data: {}, budgetLimit: 125000 }],
            theme: 'light'
        };
        let currentPeriodId = state.archives[0]?.id;

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

        function applyTheme() {
            document.documentElement.setAttribute('data-theme', state.theme);
            const sun = document.getElementById('sunIcon');
            const moon = document.getElementById('moonIcon');
            if (state.theme === 'dark') {
                sun.classList.remove('hidden');
                moon.classList.add('hidden');
            } else {
                sun.classList.add('hidden');
                moon.classList.remove('hidden');
            }
        }

        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            save();
            applyTheme();
        }

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            if (document.getElementById('digitalClock')) document.getElementById('digitalClock').textContent = timeStr;
        }
        setInterval(updateClock, 1000);

        function getItemPrice(name) {
            const item = state.items.find(i => i.name === name.toUpperCase().trim());
            return item ? item.price : 0;
        }

        function getProgressColor(perc) {
            if (perc < 50) return '#1ba0ad';
            if (perc < 90) return '#fbc02d';
            return '#e0474c';
        }

        function renderMasterData() {
            const currentPeriod = state.archives.find(a => a.id === currentPeriodId);
            document.getElementById('limitInput').value = currentPeriod.budgetLimit || state.defaultBudgetLimit;
            
            const qItem = (document.getElementById('searchMasterItem').value || "").toUpperCase();
            const filteredItems = state.items.filter(it => it.name.includes(qItem));

            const itemBody = document.getElementById('masterItemTable');
            itemBody.innerHTML = filteredItems.map((it) => {
                const originalIdx = state.items.findIndex(original => original.id === it.id);
                return `
                    <tr class="border-b border-slate-50">
                        <td class="py-3 pr-2 uppercase font-bold text-slate-500 text-[10px]">${it.name}</td>
                        <td class="py-3 text-right"><input type="number" class="w-24 text-right bg-slate-50 rounded px-2 py-1 outline-none font-mono text-[10px] font-bold" value="${it.price}" onchange="updateMasterItem(${originalIdx}, 'price', this.value)" style="border: 1px solid var(--border-color); color: var(--text-main);"></td>
                        <td class="py-3 text-center w-8"><button onclick="deleteMasterItem(${originalIdx})" class="text-slate-300 hover:text-red-500 font-bold">×</button></td>
                    </tr>
                `;
            }).join('');

            const qEmp = (document.getElementById('searchMasterEmployee').value || "").toUpperCase();
            const filteredEmps = state.employees.filter(e => e.name.includes(qEmp));

            const empBody = document.getElementById('masterEmployeeTable');
            empBody.innerHTML = filteredEmps.map((emp) => {
                const originalIdx = state.employees.findIndex(original => original.id === emp.id);
                return `
                    <tr class="border-b border-slate-50">
                        <td class="py-3">
                            <input class="w-full bg-slate-50 px-3 py-1.5 rounded-lg font-bold uppercase outline-none text-[10px] mb-1" placeholder="NAMA PEGAWAI" value="${emp.name}" onchange="updateMasterEmployee(${originalIdx}, 'name', this.value)" style="border: 1px solid var(--border-color); color: var(--text-main);">
                            <input class="w-full bg-slate-50 px-3 py-1 rounded-lg text-[8px] outline-none" placeholder="URL FOTO (OPSIONAL)" value="${emp.photo || ''}" onchange="updateMasterEmployee(${originalIdx}, 'photo', this.value)" style="border: 1px solid var(--border-color); color: var(--text-muted);">
                        </td>
                        <td class="py-3 text-center w-8"><button onclick="deleteMasterEmployee(${originalIdx})" class="text-slate-300 hover:text-red-500 font-bold">×</button></td>
                    </tr>
                `;
            }).join('');

            document.getElementById('periodList').innerHTML = state.archives.map(a => `
                <button onclick="selectPeriod(${a.id})" class="px-4 py-2 text-[10px] font-black rounded-xl border border-slate-200 transition-all ${currentPeriodId === a.id ? 'bg-[#1ba0ad] text-white border-[#1ba0ad]' : 'bg-white text-slate-400'}">
                    ${a.period}
                </button>
            `).join('');

            document.getElementById('itemsDatalist').innerHTML = state.items.map(it => `<option value="${it.name}">`).join('');
        }

        function render() {
            const period = state.archives.find(a => a.id === currentPeriodId);
            if(!period) return;

            if(!period.budgetLimit) period.budgetLimit = state.defaultBudgetLimit || 125000;

            document.getElementById('periodInput').value = period.period || "";
            document.getElementById('monthInput').value = period.month || "";

            const searchQuery = document.getElementById('searchEmployee').value.toUpperCase();
            const listEl = document.getElementById('employeeList');
            listEl.innerHTML = '';
            let grandTotalSum = 0;

            state.employees.filter(emp => emp.name.toUpperCase().includes(searchQuery)).forEach(emp => {
                const empData = period.data[emp.id] || [];
                const total = empData.reduce((s, i) => s + (getItemPrice(i.name) * i.qty), 0);
                const remaining = Math.max(period.budgetLimit - total, 0);
                const percentage = Math.min((total / period.budgetLimit) * 100, 100);
                grandTotalSum += total;

                const photoHTML = emp.photo 
                    ? `<img src="${emp.photo}" class="profile-img border-2 border-white cursor-pointer" alt="${emp.name}" onclick="editQuickPhoto('${emp.id}')" onerror="this.src=''; this.onerror=null; this.outerHTML='<span class=\'profile-img cursor-pointer\' onclick=\'editQuickPhoto(\\\'${emp.id}\\\')\'>${emp.name.charAt(0)}</span>';">`
                    : `<span class="profile-img cursor-pointer" onclick="editQuickPhoto('${emp.id}')">${emp.name.charAt(0)}</span>`;

                const card = document.createElement('div');
                card.className = "rounded-[2.5rem] border border-slate-200 p-8 bg-white card-shadow";
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between items-start mb-8 gap-6">
                        <div class="flex-1">
                            <h3 class="font-black text-2xl uppercase text-slate-900 tracking-tighter flex items-center gap-4">
                                ${photoHTML}
                                ${emp.name}
                            </h3>
                            <button onclick="printDetail('${emp.id}')" class="mt-4 flex items-center gap-2 text-[8px] font-black px-4 py-2 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-all uppercase tracking-widest">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" stroke-width="3"></path></svg>
                                Rincian Pegawai
                            </button>
                        </div>
                        <div class="text-right flex flex-col items-end min-w-[320px] w-full md:w-auto">
                            <div class="flex w-full mb-2">
                                <div class="flex-1 text-left pr-4">
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Weekly Usage</p>
                                    <h4 class="text-2xl font-black text-slate-900 tracking-tighter">Rp ${total.toLocaleString()}</h4>
                                </div>
                                <div class="flex-1 text-right pl-4 border-l-2 border-slate-100">
                                    <p class="text-[9px] font-black text-teal-500 uppercase tracking-widest mb-1">Sisa Saldo</p>
                                    <h4 class="text-xl font-black text-teal-600 tracking-tighter">Rp ${remaining.toLocaleString()}</h4>
                                </div>
                            </div>
                            <div class="w-full mt-2">
                                <div class="flex justify-between text-[9px] font-black uppercase mb-1.5">
                                    <span class="text-slate-400">Budget Limit (Rp ${period.budgetLimit.toLocaleString()})</span>
                                    <span style="color: ${getProgressColor(percentage)}">${Math.round(percentage)}%</span>
                                </div>
                                <div class="progress-container">
                                    <div class="progress-bar-fill" style="width: ${percentage}%; background-color: ${getProgressColor(percentage)};"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                        ${DAYS.map(day => {
                            const dayItems = empData.filter(d => d.day === day);
                            return `
                                <div class="p-4 rounded-3xl border border-slate-100" style="background-color: var(--barely-gray);">
                                    <span class="text-[10px] font-black text-slate-400 block mb-4 uppercase text-center tracking-widest">${day}</span>
                                    <div class="space-y-3">
                                        ${dayItems.map(it => `
                                            <div class="bg-white p-3 rounded-2xl border border-slate-200 card-shadow">
                                                <input type="text" list="itemsDatalist" value="${it.name}" 
                                                    onchange="updateItem('${emp.id}', '${it.uid}', 'name', this.value)"
                                                    class="item-input-box mb-2 uppercase" placeholder="MENU...">
                                                <div class="flex items-center justify-between">
                                                    <input type="number" value="${it.qty}" 
                                                        onchange="updateItem('${emp.id}', '${it.uid}', 'qty', this.value)"
                                                        class="w-10 bg-slate-50 text-xs font-black outline-none text-center rounded py-1">
                                                    <div class="text-right">
                                                        <p class="text-[9px] font-black text-slate-900">Rp ${(it.qty * getItemPrice(it.name)).toLocaleString()}</p>
                                                    </div>
                                                    <button onclick="removeItem('${emp.id}', '${it.uid}')" class="text-slate-200 hover:text-red-500 font-black ml-2">×</button>
                                                </div>
                                            </div>
                                        `).join('')}
                                        <button onclick="addItem('${emp.id}', '${day}')" class="w-full py-3 border-2 border-dashed border-slate-300 rounded-2xl text-slate-400 font-black text-[9px] hover:bg-white transition-all uppercase">+ MENU</button>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                listEl.appendChild(card);
            });
            document.getElementById('grandTotalDisplay').innerText = `Rp ${grandTotalSum.toLocaleString()}`;
        }

        // --- CORE FUNCTIONS ---
        function updateMasterItem(idx, field, val) { state.items[idx][field] = parseInt(val) || 0; save(); render(); }
        function addMasterItem() {
            const name = prompt("Nama Menu:");
            if(name) { state.items.push({ id: Date.now(), name: name.toUpperCase(), price: 0 }); save(); renderMasterData(); render(); }
        }
        function deleteMasterItem(idx) { if(confirm('Hapus menu?')) { state.items.splice(idx, 1); save(); renderMasterData(); render(); } }
        
        function updateMasterEmployee(idx, field, val) { 
            state.employees[idx][field] = field === 'name' ? val.toUpperCase() : val; 
            save(); render(); 
        }
        function editQuickPhoto(empId) {
            const emp = state.employees.find(e => e.id === empId);
            const newPhoto = prompt(`Masukkan URL Foto untuk ${emp.name}:`, emp.photo || '');
            if (newPhoto !== null) {
                emp.photo = newPhoto;
                save(); render(); renderMasterData();
            }
        }
        function addMasterEmployee() { state.employees.push({ id: 'emp_' + Date.now(), name: 'PEGAWAI BARU', photo: '' }); save(); renderMasterData(); render(); }
        function deleteMasterEmployee(idx) { if(confirm('Hapus pegawai?')) { state.employees.splice(idx, 1); save(); renderMasterData(); render(); } }
        
        function updateLimit(val) { 
            const period = state.archives.find(a => a.id === currentPeriodId);
            const numVal = parseInt(val) || 0;
            if(period) {
                period.budgetLimit = numVal;
                state.defaultBudgetLimit = numVal; 
            }
            save(); render(); 
        }

        function updatePeriodMeta() {
            const p = state.archives.find(a => a.id === currentPeriodId);
            p.period = document.getElementById('periodInput').value.toUpperCase();
            p.month = document.getElementById('monthInput').value.toUpperCase();
            save(); renderMasterData();
        }
        function selectPeriod(id) { currentPeriodId = id; render(); renderMasterData(); }
        function addItem(empId, day) {
            const p = state.archives.find(a => a.id === currentPeriodId);
            if(!p.data[empId]) p.data[empId] = [];
            p.data[empId].push({ uid: Date.now(), day, name: '', qty: 1 });
            save(); render();
        }
        function updateItem(empId, uid, field, val) {
            const p = state.archives.find(a => a.id === currentPeriodId);
            const item = p.data[empId].find(i => i.uid == uid);
            item[field] = field === 'qty' ? parseInt(val) || 0 : val.toUpperCase();
            save(); render();
        }
        function removeItem(empId, uid) {
            const p = state.archives.find(a => a.id === currentPeriodId);
            p.data[empId] = p.data[empId].filter(i => i.uid != uid);
            save(); render();
        }
        function addNewPeriod() {
            const name = prompt("Nama Periode (Contoh: MINGGU 2):");
            if(name) {
                const n = { 
                    id: Date.now(), 
                    period: name.toUpperCase(), 
                    month: 'BARU', 
                    data: {},
                    budgetLimit: state.defaultBudgetLimit 
                };
                state.archives.unshift(n); currentPeriodId = n.id;
                save(); render(); renderMasterData();
            }
        }
        function exportData() {
            const blob = new Blob([JSON.stringify(state)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `ExtraFood_Backup.json`; a.click();
        }
        function importData(e) {
            const r = new FileReader();
            r.onload = (ev) => { 
                try {
                    state = JSON.parse(ev.target.result); 
                    if (!state.employees[0].photo && state.employees[0].photo !== "") {
                         state.employees = state.employees.map(e => ({...e, photo: ''}));
                    }
                    currentPeriodId = state.archives[0].id; 
                    save(); render(); renderMasterData(); applyTheme();
                } catch(err) { alert("Format file tidak valid!"); }
            };
            r.readAsText(e.target.files[0]);
        }

        function printRekap() {
            const period = state.archives.find(a => a.id === currentPeriodId);
            let grandTotal = 0;
            let rows = '';
            state.employees.forEach((emp, i) => {
                const empData = period.data[emp.id] || [];
                const total = empData.reduce((s, it) => s + (getItemPrice(it.name) * it.qty), 0);
                grandTotal += total;
                rows += `<tr><td style="border:1px solid #000;padding:8px;text-align:center;">${i+1}</td><td style="border:1px solid #000;padding:8px;text-transform:uppercase;">${emp.name}</td><td style="border:1px solid #000;padding:8px;text-align:right;">Rp ${total.toLocaleString()}</td></tr>`;
            });
            document.getElementById('printArea').innerHTML = `<div style="text-align:center;margin-bottom:20px;"><h2>REKAP EXTRA FOOD</h2><p>${period.period} - ${period.month}</p></div><table style="width:100%;border-collapse:collapse;"><thead><tr><th style="border:1px solid #000;padding:8px;">NO</th><th style="border:1px solid #000;padding:8px;">NAMA</th><th style="border:1px solid #000;padding:8px;">TOTAL</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><th colspan="2" style="border:1px solid #000;padding:8px;text-align:right;">GRAND TOTAL</th><th style="border:1px solid #000;padding:8px;text-align:right;">Rp ${grandTotal.toLocaleString()}</th></tr></tfoot></table>`;
            window.print();
        }

        function printDetail(empId) {
            const period = state.archives.find(a => a.id === currentPeriodId);
            const emp = state.employees.find(e => e.id === empId);
            const empData = period.data[empId] || [];
            let total = 0;
            let content = DAYS.map(day => {
                const items = empData.filter(d => d.day === day);
                if (items.length === 0) return '';
                let dTotal = items.reduce((s, it) => s + (getItemPrice(it.name) * it.qty), 0);
                total += dTotal;
                return `<div style="margin-bottom:15px;"><h4 style="border-bottom:1px solid #000;margin:0 0 5px 0;">${day}</h4><table style="width:100%;font-size:12px;">${items.map(it => `<tr><td>${it.name}</td><td style="text-align:center;">${it.qty}x</td><td style="text-align:right;">Rp ${(it.qty*getItemPrice(it.name)).toLocaleString()}</td></tr>`).join('')}</table></div>`;
            }).join('');
            document.getElementById('printArea').innerHTML = `<div style="text-align:center;"><h3>RINCIAN EXTRA FOOD</h3><h2>${emp.name}</h2><p>${period.period}</p></div><hr>${content}<hr><h3 style="text-align:right;">TOTAL: Rp ${total.toLocaleString()}</h3>`;
            window.print();
        }

        window.onload = () => { applyTheme(); updateClock(); render(); renderMasterData(); };
    </script>
</body>
</html>
